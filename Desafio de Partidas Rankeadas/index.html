<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Desafio de Partidas Rankeadas</title>
  
  <script src="index.js" defer></script>
</head>

<body>
  <h1>Cálculo de Partidas Rankeadas</h1>
  <hr>

  <label for="victories">Digite a quantidade de Vitórias</label>
  <br>
  <input type="text" name="victories" id="victories">
  
  <br><br>
  
  <label for="defeats">Digite a quantidade de Derrotas</label>
  <br>
  <input type="text" name="defeats" id="defeats">
  
  <br><br>  
  
  <button id="calcBtn">Calcular o seu Rank</button>
  
  <br><br>

  <label for="deffeatsBalance">Seu Saldo de Vitórias é:</label>
  <br>
  <input type="text" name="deffeatsBalance" id="deffeatsBalance" disabled>
  
  <br><br>
  
  <label for="positionRank">Sua Posição no Rank é:</label>
  <br>
  <input type="text" name="positionRank" id="positionRank" disabled>
  
  <hr>
  
  <footer>&copy; Davi Guedes, Desenvolvedor Full Stack JavaScript</footer>
</body>

</html>
