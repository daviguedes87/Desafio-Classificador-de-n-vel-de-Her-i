<!DOCTYPE html>

<html lang="pt-br"> 

<head>
  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Desafio Classificador de Nível de Herói</title>

  <script src="index.js" defer></script>
</head>

<body>
  <h1>Desafio dos heróis DIO</h1>

  <label for="nameHeroi">Digite o nome do Herói: </label>
  <br> 

  <input type="text" name="nameHeroi" id="nameHeroi">
  <br><br>

  <label for="powerHeroi">Escolha o XP do Herói (de 1.000 até 10.000): </label>
  <br>

  <input type="number" name="powerHeroi" id="powerHeroi"> 
  
  <button id="heroiBtn">Enviar Herói</button>
  <br><br>

  <label for="showNameHeroi">Nome do Herói confirmado:</label>
  <br>
  
  <input type="text" name="showNameHeroi" id="showNameHeroi" disabled>
  <br><br>

  <label for="showXpHeroi">Seu Herói tem o nível: </label>
  <br>

  <input type="text" name="showXpHeroi" id="showXpHeroi" disabled>
  <br><br>

  <footer>&copy; Davi Guedes, Desenvolvedor Full Stack JavaScript</footer>
</body>

</html>
